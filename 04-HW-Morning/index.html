<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css" type="text/css">
    <title>Login Form</title>
</head>

<body>
    <div class="section">
        <div class="container">
            <h1>Авторизация</h1>
            <form>
                <div class="texts">
                    <input type="text" name="login" placeholder="Логин" required>
                    <input type="password" name="password" placeholder="Пароль" required>
                </div>
                <div class="buttons">
                    <button type="submit" name="submitButton">Войти</button>
                    <button type="reset" name="resetButton">Очистить поля</button>
                </div>
                <div class="checkbox">
                    <input type="checkbox" name="remember-checkbox" required>
                    <label for="remember-checkbox">Запомни меня</label>
                </div>
            </form>

        </div>
    </div>
</body>

</html>
